name: meal_planner
description: A weekly meal planning Flutter application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  provider: ^6.1.1
  uuid: ^4.2.1
  intl: ^0.18.1
  shared_preferences: ^2.2.2
  cloud_functions: ^4.7.0
  url_launcher: ^6.3.2
  flutter_secure_storage: ^10.0.0
  connectivity_plus: 5.0.2
  http: ^1.1.0

dependency_overrides:
  firebase_core_web: ^2.17.0
  firebase_auth_web: ^5.12.0
  cloud_firestore_web: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true